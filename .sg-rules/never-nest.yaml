id: python-excessive-nesting
language: Python
message: "Logical control flow and nested functions exceed 3 levels."
severity: error
utils:
  logical-statement:
    any:
      - kind: function_definition
      - kind: if_statement
      - kind: for_statement
      - kind: while_statement
      - kind: try_statement
      - kind: with_statement
      - kind: match_statement
rule:
  matches: logical-statement
  inside:
    matches: logical-statement
    stopBy: end
    inside:
      matches: logical-statement
      stopBy: end
      inside:
        matches: logical-statement
        stopBy: end
